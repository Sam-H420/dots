# Don't print a new line at the start of the prompt
add_newline = false
# Pipes ╰─ ╭─
# Powerline symbols                                     
# Wedges 🭧🭒 🭣🭧🭓
# Random noise 🬖🬥🬔🬗
# Cool stuff 󰜥   

# format = """
# $directory $fill $git_branch $cmd_duration
#  $character"""
format = """
$cmd_duration $directory$git_branch
  $character"""

[fill]
symbol = '-'
style = '#24283b' #TODO colors go where u find fg:

# Replace the "❯" symbol in the prompt with "➜"
[character]                            # The name of the module we are configuring is "character"
success_symbol = "[ ](bold #7da6ff)"
error_symbol = "[ ](bold #ff7a93)"

# Disable the package module, hiding it from the prompt completely
[package]
disabled = true

[git_branch]
style = "#24283b"
symbol = "󰘬"
truncation_length = 12
truncation_symbol = ""
format = " ~ [](bold #a9b1d6)[$symbol $branch(:$remote_branch)](bg:#a9b1d6 fg:#24283b)[ ](bold #a9b1d6)"

[git_commit]
commit_hash_length = 4
tag_symbol = " "

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '
cherry_pick = "[🍒 PICKING](bold #ff7a93)"

[git_status]
conflicted = " 🏳 "
ahead = " 🏎💨 "
behind = " 😰 "
diverged = " 😵 "
untracked = " 🤷 ‍"
stashed = " 📦 "
modified = " 📝 "
staged = '[++\($count\)](#9ece6a)'
renamed = " ✍️ "
deleted = " 🗑 "

[hostname]
ssh_only = false
format =  "[•$hostname](bg:#a9b1d6 bold fg:#24283b)[](bold #a9b1d6)"
trim_at = ".companyname.com"
disabled = false

[line_break]
disabled = false

[memory_usage]
disabled = true
threshold = -1
symbol = " "
style = "bold dimmed green"

[time]
disabled = true
format = '🕙[\[ $time \]]($style) '
time_format = "%T"

[username]
style_user = "bold bg:#a9b1d6 fg:#24283b"
style_root = "#f7768e bold"
format = "[](bold #a9b1d6)[$user]($style)"
disabled = false
show_always = true

[directory]
home_symbol = " "
read_only = "  "
style = "bg:#a9b1d6 fg:#24283b"
truncation_length = 2
truncation_symbol = ".../"
format = '[](bold #a9b1d6)[󰉋 → $path]($style)[](bold #a9b1d6)'


[directory.substitutions]
"Desktop" = "  "
"Documents" = "  "
"Downloads" = "  "
"Music" = " 󰎈 "
"Pictures" = "  "
"Videos" = "  "
"GitHub" = " 󰊤 "

[cmd_duration]
min_time = 0
format = '[](bold #a9b1d6)[󰪢 $duration](bold bg:#a9b1d6 fg:#24283b)[](bold #a9b1d6)'